<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定义关系知识图谱可视化工具</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #0a0a1a;
            overflow: hidden;
            position: relative;
        }

        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        #main {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .sidebar {
            position: fixed;
            top: 0;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .sidebar-left {
            left: 0;
            height: 100%;
        }

        .sidebar-right {
            right: 0;
            height: 100%;
        }

        .sidebar-content {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-toggle {
            position: absolute;
            top: 20px;
            right: -20px;
            width: 20px;
            height: 20px;
            background: rgba(20, 20, 40, 0.95);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 4px;
            color: #6496ff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            transition: all 0.3s ease;
            z-index: 101;
        }

        .sidebar-toggle:hover {
            background: rgba(100, 150, 255, 0.2);
        }

        .sidebar-left .sidebar-toggle {
            right: -20px;
        }

        .sidebar-right .sidebar-toggle {
            left: -20px;
            top: 20px;
            right: auto;
        }

        .sidebar.collapsed .sidebar-left .sidebar-toggle {
            right: -20px;
        }

        .sidebar.collapsed .sidebar-right .sidebar-toggle {
            left: -20px;
        }

        .sidebar-panel {
            height: 100%;
            overflow-y: auto;
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(100, 150, 255, 0.2);
            padding: 12px 10px 20px 10px;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        /* 左侧侧边栏滚动条样式 */
        .sidebar-panel::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-panel::-webkit-scrollbar-track {
            background: rgba(10, 10, 30, 0.5);
        }

        .sidebar-panel::-webkit-scrollbar-thumb {
            background: rgba(100, 150, 255, 0.4);
            border-radius: 3px;
        }

        .sidebar-panel::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 150, 255, 0.6);
        }

        .sidebar-right .sidebar-panel {
            border-right: none;
            border-left: 1px solid rgba(100, 150, 255, 0.2);
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.4);
        }

        .sidebar.collapsed .sidebar-panel {
            width: 0 !important;
            padding: 16px 0;
            overflow: hidden;
        }

        .toolbar-group {
            background: rgba(20, 20, 40, 0.6);
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .toolbar-title {
            color: #6496ff;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn {
            width: 100%;
            padding: 8px 12px;
            margin: 3px 0;
            background: rgba(40, 40, 80, 0.8);
            border: 1px solid rgba(100, 150, 255, 0.4);
            color: #e0e6ff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn:hover {
            background: rgba(50, 50, 100, 0.8);
            border-color: rgba(100, 150, 255, 0.8);
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.3);
            transform: translateX(2px);
        }

        .btn-primary {
            background: #6496ff;
            border: none;
            color: white;
        }

        .btn-primary:hover {
            background: #7aa6ff;
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.5);
        }

        .btn-danger {
            background: rgba(255, 100, 100, 0.2);
            border-color: rgba(255, 100, 100, 0.4);
            color: #ff9696;
        }

        .btn-danger:hover {
            background: rgba(255, 100, 100, 0.4);
            border-color: rgba(255, 100, 100, 0.8);
            box-shadow: 0 0 15px rgba(255, 100, 100, 0.3);
        }

        /* 导出格式按钮样式 */
        .format-btn {
            transition: all 0.3s ease;
            border: 1px solid rgba(100, 150, 255, 0.3) !important;
            background: rgba(30, 30, 60, 0.9) !important;
            color: #b0b8d0 !important;
            padding: 10px !important;
            border-radius: 8px !important;
        }

        .format-btn:hover {
            border-color: rgba(100, 150, 255, 0.6) !important;
            background: rgba(40, 40, 70, 0.9) !important;
        }

        .format-btn.active {
            border: 2px solid #6496ff !important;
            background: linear-gradient(135deg, #6496ff, #9664ff) !important;
            color: white !important;
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.6) !important;
            transform: scale(1.05) !important;
            font-weight: 600 !important;
        }

        .info-panel {
            color: #e0e6ff;
            font-size: 13px;
        }

        .info-title {
            color: #6496ff;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .info-item {
            padding: 5px 0;
            border-bottom: 1px solid rgba(100, 150, 255, 0.1);
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #8a9ab8;
            font-size: 10px;
        }

        .info-value {
            color: #e0e6ff;
            font-weight: 500;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(20, 20, 50, 0.98), rgba(30, 30, 60, 0.98));
            border: 1px solid rgba(100, 150, 255, 0.4);
            border-radius: 16px;
            padding: 28px;
            min-width: 400px;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6),
                        0 0 40px rgba(100, 150, 255, 0.2);
        }

        /* 自定义滚动条 */
        .modal-content::-webkit-scrollbar {
            width: 8px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: rgba(10, 10, 30, 0.5);
            border-radius: 4px;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: rgba(100, 150, 255, 0.4);
            border-radius: 4px;
        }

        .modal-content::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 150, 255, 0.6);
        }

        .modal-title {
            color: #6496ff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            color: #a0b0d0;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(10, 10, 30, 0.8);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 8px;
            color: #e0e6ff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(100, 150, 255, 0.8);
            box-shadow: 0 0 12px rgba(100, 150, 255, 0.3);
        }

        .form-input[type="number"] {
            -moz-appearance: textfield;
            padding: 6px 8px;
            font-size: 14px;
        }

        .form-input[type="number"]::-webkit-outer-spin-button,
        .form-input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .form-select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(10, 10, 30, 0.8);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 8px;
            color: #e0e6ff;
            font-size: 14px;
            cursor: pointer;
        }

        .form-select:focus {
            outline: none;
            border-color: rgba(100, 150, 255, 0.8);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .modal-btn-cancel {
            background: rgba(100, 100, 120, 0.3);
            color: #a0b0d0;
            border: 1px solid rgba(100, 100, 120, 0.5);
        }

        .modal-btn-cancel:hover {
            background: rgba(100, 100, 120, 0.5);
        }

        .modal-btn-confirm {
            background: linear-gradient(135deg, #6496ff, #9664ff);
            color: white;
        }

        .modal-btn-confirm:hover {
            background: linear-gradient(135deg, #7aa6ff, #a67aff);
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.4);
        }

        .color-picker-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-picker {
            width: 50px;
            height: 36px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
        }

        .color-picker::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-picker::-webkit-color-swatch {
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 6px;
        }

        .image-upload-container {
            margin-top: 10px;
        }

        .image-upload-btn {
            width: 100%;
            padding: 8px 12px;
            background: linear-gradient(135deg, rgba(100, 150, 255, 0.2), rgba(150, 100, 255, 0.2));
            border: 1px solid rgba(100, 150, 255, 0.4);
            color: #e0e6ff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .image-upload-btn:hover {
            background: linear-gradient(135deg, rgba(100, 150, 255, 0.4), rgba(150, 100, 255, 0.4));
            border-color: rgba(100, 150, 255, 0.8);
        }

        .image-preview {
            margin-top: 10px;
            text-align: center;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 8px;
            border: 1px solid rgba(100, 150, 255, 0.3);
        }

        .crop-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 10px auto;
            overflow: hidden;
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 8px;
        }

        .crop-image {
            position: absolute;
            top: 0;
            left: 0;
            cursor: move;
            max-width: none;
            max-height: none;
        }

        .crop-mask {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, transparent 30%, rgba(0, 0, 0, 0.8) 30%, rgba(0, 0, 0, 0.8) 100%);
            pointer-events: none;
        }

        .crop-mask.square {
            background: linear-gradient(to right, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.8) 30%, transparent 30%, transparent 70%, rgba(0, 0, 0, 0.8) 70%, rgba(0, 0, 0, 0.8) 100%),
                        linear-gradient(to bottom, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.8) 30%, transparent 30%, transparent 70%, rgba(0, 0, 0, 0.8) 70%, rgba(0, 0, 0, 0.8) 100%);
        }

        .crop-guide {
            position: absolute;
            top: 30%;
            left: 30%;
            width: 40%;
            height: 40%;
            border: 2px solid #6496ff;
            pointer-events: none;
        }

        .crop-guide.circle {
            border-radius: 50%;
        }

        .zoom-controls {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 10;
        }

        .zoom-btn {
            width: 30px;
            height: 30px;
            background: rgba(20, 20, 40, 0.9);
            border: 1px solid rgba(100, 150, 255, 0.4);
            border-radius: 50%;
            color: #e0e6ff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .zoom-btn:hover {
            background: rgba(100, 150, 255, 0.3);
            border-color: #6496ff;
        }

        .crop-shape-selector {
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }

        .shape-btn {
            flex: 1;
            padding: 6px;
            background: rgba(10, 10, 30, 0.8);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 6px;
            color: #e0e6ff;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .shape-btn.active {
            background: linear-gradient(135deg, #6496ff, #9664ff);
            border-color: #6496ff;
        }



        .crop-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .crop-btn {
            flex: 1;
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .crop-btn-primary {
            background: linear-gradient(135deg, #6496ff, #9664ff);
            color: white;
        }

        .crop-btn-secondary {
            background: rgba(100, 100, 120, 0.3);
            color: #a0b0d0;
            border: 1px solid rgba(100, 100, 120, 0.5);
        }

        .help-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(20, 20, 40, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 12px;
            padding: 12px 24px;
            color: #a0b0d0;
            font-size: 12px;
            text-align: center;
        }

        .help-hint span {
            margin: 0 8px;
        }

        .help-hint kbd {
            background: rgba(100, 150, 255, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            color: #6496ff;
            font-family: inherit;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>
    <div id="main"></div>

    <div class="sidebar sidebar-left" id="sidebarLeft">
        <div class="sidebar-toggle" onclick="toggleSidebar('sidebarLeft')">≡</div>
        <div class="sidebar-content">
            <div class="sidebar-panel" style="width: 200px;">
                <div class="toolbar-group">
                    <div class="toolbar-title">搜索定位</div>
                    <input type="text" class="form-input" id="searchInput" placeholder="输入节点名称搜索" style="margin-bottom: 8px;">
                    <button class="btn btn-primary" onclick="searchNode()">🔍 搜索定位</button>
                </div>
                <div class="toolbar-group">
                    <div class="toolbar-title">节点操作</div>
                    <button class="btn btn-primary" onclick="openNodeModal()">➕ 新增节点</button>
                    <button class="btn" onclick="openEditNodeModal()">✏️ 编辑选中</button>
                    <button class="btn" onclick="expandCollapseNode()">📂 展开/收起子层级</button>
                    <button class="btn btn-danger" onclick="deleteSelectedNode()">🗑️ 删除节点</button>
                </div>
                <div class="toolbar-group">
                    <div class="toolbar-title">关系操作</div>
                    <button class="btn btn-primary" onclick="startConnectMode()">🔗 开始连线</button>
                    <button class="btn" onclick="openEditEdgeModal()">✏️ 编辑关系</button>
                    <button class="btn btn-danger" onclick="deleteSelectedEdge()">🗑️ 删除关系</button>
                </div>
                <div class="toolbar-group">
                    <div class="toolbar-title">编辑操作</div>
                    <button class="btn btn-primary" onclick="undo()">↩️ 撤销</button>
                    <button class="btn" onclick="redo()">↪️ 重做</button>
                </div>
                <div class="toolbar-group">
                    <div class="toolbar-title">视图控制</div>
                    <button class="btn" onclick="centerView()">🎯 居中视图</button>
                    <button class="btn btn-danger" onclick="clearAllData()">🗑️ 清空视图</button>
                </div>
                <div class="toolbar-group">
                    <div class="toolbar-title">数据管理</div>
                    <button class="btn" onclick="exportData()">💾 保存数据</button>
                    <button class="btn" onclick="document.getElementById('importFile').click()">📂 导入数据</button>
                    <input type="file" id="importFile" style="display: none;" accept=".json" onchange="importData(event)">
                    <button class="btn btn-primary" onclick="openExportModal()">📤 导出</button>
                </div>
                <div class="toolbar-group">
                    <div class="toolbar-title">图表设置</div>
                    <button class="btn" onclick="openLegendModal()">🎨 编辑图例</button>
                    <button class="btn" onclick="openAttributeTable()">📋 属性表</button>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar sidebar-right" id="sidebarRight">
        <div class="sidebar-toggle" onclick="toggleSidebar('sidebarRight')">≡</div>
        <div class="sidebar-content">
            <div class="sidebar-panel" style="width: 180px;">
                <div class="info-panel">
                    <div class="info-title">📊 图谱信息</div>
                    <div class="info-item">
                        <div class="info-label">节点数量</div>
                        <div class="info-value" id="nodeCount">0</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">关系数量</div>
                        <div class="info-value" id="edgeCount">0</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">模式</div>
                        <div class="info-value" id="currentMode">浏览</div>
                    </div>
                    <div class="info-item" id="selectedInfo" style="display: none;">
                        <div class="info-label">选中 ID</div>
                        <div class="info-value" id="selectedId">-</div>
                    </div>
                    <div class="info-item" id="selectedInfoName" style="display: none;">
                        <div class="info-label">选中名称</div>
                        <div class="info-value" id="selectedName">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="help-hint">
        <span><kbd>滚轮</kbd> 缩放</span>
        <span><kbd>拖拽</kbd> 移动画布</span>
        <span><kbd>拖拽节点</kbd> 调整位置</span>
        <span><kbd>点击</kbd> 高亮关系链</span>
    </div>

    <div class="modal" id="nodeModal">
        <div class="modal-content">
            <div class="modal-title" id="nodeModalTitle">新增节点</div>
            <div class="form-group">
                <label class="form-label">节点ID</label>
                <input type="text" class="form-input" id="nodeId" placeholder="自动生成" readonly>
            </div>
            <div class="form-group">
                <label class="form-label">节点名称</label>
                <input type="text" class="form-input" id="nodeName" placeholder="请输入节点名称">
            </div>
            <div class="form-group">
                <label class="form-label">节点类型</label>
                <select class="form-select" id="nodeCategory">
                    <option value="0">人物</option>
                    <option value="1">事件</option>
                    <option value="2">物品</option>
                    <option value="3">地点</option>
                    <option value="4">时间</option>
                    <option value="5">项目</option>
                    <option value="6">概念</option>
                    <option value="7">组织</option>
                    <option value="8">其他</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">节点大小</label>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="range" class="form-input" id="nodeSize" min="0" max="100" value="40" style="flex: 1;">
                    <input type="number" class="form-input" id="nodeSizeValue" min="0" max="100" value="40" style="width: 60px;">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">描边颜色</label>
                <div class="color-picker-wrapper">
                    <input type="color" class="color-picker" id="nodeBorderColor" value="#6496ff">
                    <input type="text" class="form-input" id="nodeBorderColorText" value="#6496ff">
                </div>
                <div style="margin-top: 8px; display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label class="form-label" style="font-size: 11px; margin-bottom: 4px;">R</label>
                        <input type="number" class="form-input" id="nodeBorderColorR" min="0" max="255" value="100" style="padding: 6px;">
                    </div>
                    <div style="flex: 1;">
                        <label class="form-label" style="font-size: 11px; margin-bottom: 4px;">G</label>
                        <input type="number" class="form-input" id="nodeBorderColorG" min="0" max="255" value="150" style="padding: 6px;">
                    </div>
                    <div style="flex: 1;">

    <script>
        let chart;
        let data = {
            nodes: [],
            links: []
        };
        let selectedNode = null;
        let selectedEdge = null;
        let connectMode = false;
        let connectStart = null;
        let editingNodeId = null;
        let editingEdgeIndex = null;
        let history = []; // 撤销历史记录
        let historyIndex = -1; // 当前历史位置
        const maxHistoryLength = 50; // 最大历史记录数
        
        let exportFormat = 'png'; // 当前导出格式
        
        // 全局状态变量，用于管理节点布局和视图
        let hasLayoutCompleted = false;

        // 颜色转换辅助函数
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 100, g: 150, b: 255 };
        }

        function rgbToHex(r, g, b) {
            return '#' + [r, g, b].map(x => {
                const hex = Math.max(0, Math.min(255, x)).toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            }).join('');
        }

        // 保存当前状态到历史
        function saveToHistory() {
            // 深拷贝当前数据
            const currentState = JSON.parse(JSON.stringify(data));
            historyIndex++;
            // 删除当前位置之后的历史
            history = history.slice(0, historyIndex);
            history.push(currentState);
            // 限制历史记录长度
            if (history.length > maxHistoryLength) {
                history.shift();
                historyIndex--;
            }
        }

        // 撤销操作
        function undo() {
            if (historyIndex <= 0) {
                alert('没有可撤销的操作！');
                return;
            }
            historyIndex--;
            data = JSON.parse(JSON.stringify(history[historyIndex]));
            hasLayoutCompleted = false;
            updateChart();
            updateInfo();
            selectedNode = null;
            selectedEdge = null;
            document.getElementById('selectedInfo').style.display = 'none';
            document.getElementById('selectedInfoName').style.display = 'none';
        }

        // 重做操作
        function redo() {
            if (historyIndex >= history.length - 1) {
                alert('没有可重做的操作！');
                return;
            }
            historyIndex++;
            data = JSON.parse(JSON.stringify(history[historyIndex]));
            hasLayoutCompleted = false;
            updateChart();
            updateInfo();
            selectedNode = null;
            selectedEdge = null;
            document.getElementById('selectedInfo').style.display = 'none';
            document.getElementById('selectedInfoName').style.display = 'none';
        }

        function toggleSidebar(sidebarId) {
            const sidebar = document.getElementById(sidebarId);
            sidebar.classList.toggle('collapsed');
            const toggle = sidebar.querySelector('.sidebar-toggle');
            // 始终使用三个横线图标，不使用小三角
            toggle.textContent = '≡';
        }

        let currentImageFile = null;
        let isDragging = false;
        let startX, startY, startLeft, startTop;
        let currentCropShape = 'square';
        let imageScale = 1;

        function triggerImageUpload() {
            const input = document.getElementById('imageUpload');
            input.value = ''; // 重置值，允许重新选择同一张图片
            input.click();
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            currentImageFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                const previewImage = document.getElementById('previewImage');
                previewImage.src = e.target.result;
                document.getElementById('imagePreview').style.display = 'block';
                
                // 重置状态
                currentCropShape = 'square';
                imageScale = 1;
                
                // 重置形状选择按钮
                const shapeBtns = document.querySelectorAll('.shape-btn');
                shapeBtns.forEach(btn => btn.classList.remove('active'));
                shapeBtns[0].classList.add('active');
                
                // 重置裁剪界面
                updateCropUI();
                
                // 初始化图片位置和大小
                setTimeout(() => {
                    initImagePosition();
                    initImageDrag();
                }, 100);
            };
            reader.readAsDataURL(file);
        }

        function initImagePosition() {
            const previewImage = document.getElementById('previewImage');
            const cropContainer = document.getElementById('cropContainer');
            
            // 设置图片初始大小和位置
            const containerWidth = cropContainer.offsetWidth;
            const containerHeight = cropContainer.offsetHeight;
            const imageWidth = previewImage.naturalWidth;
            const imageHeight = previewImage.naturalHeight;
            
            // 计算缩放比例，确保图片能完全显示
            const scaleX = containerWidth / imageWidth;
            const scaleY = containerHeight / imageHeight;
            const scale = Math.min(scaleX, scaleY) * 1.2;
            
            imageScale = scale;
            previewImage.style.width = (imageWidth * scale) + 'px';
            previewImage.style.height = (imageHeight * scale) + 'px';
            
            // 居中显示
            const offsetX = (containerWidth - imageWidth * scale) / 2;
            const offsetY = (containerHeight - imageHeight * scale) / 2;
            previewImage.style.left = offsetX + 'px';
            previewImage.style.top = offsetY + 'px';
        }

        function initImageDrag() {
            const previewImage = document.getElementById('previewImage');
            const cropContainer = document.getElementById('cropContainer');
            
            previewImage.addEventListener('mousedown', startImageDrag);
            document.addEventListener('mousemove', dragImage);
            document.addEventListener('mouseup', endImageDrag);
            
            // 添加鼠标滚轮缩放功能
            cropContainer.addEventListener('wheel', function(e) {
                e.preventDefault();
                const factor = e.deltaY > 0 ? 0.9 : 1.1;
                zoomImage(factor);
            });
        }

        function startImageDrag(e) {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            const previewImage = document.getElementById('previewImage');
            startLeft = parseInt(previewImage.style.left) || 0;
            startTop = parseInt(previewImage.style.top) || 0;
            e.preventDefault();
        }

        function dragImage(e) {
            if (!isDragging) return;
            
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;
            
            const previewImage = document.getElementById('previewImage');
            const newLeft = startLeft + deltaX;
            const newTop = startTop + deltaY;
            
            previewImage.style.left = newLeft + 'px';
            previewImage.style.top = newTop + 'px';
        }

        function endImageDrag() {
            isDragging = false;
        }

        function zoomImage(factor) {
            const previewImage = document.getElementById('previewImage');
            const cropContainer = document.getElementById('cropContainer');
            
            const containerWidth = cropContainer.offsetWidth;
            const containerHeight = cropContainer.offsetHeight;
            const currentWidth = parseInt(previewImage.style.width) || previewImage.naturalWidth;
            const currentHeight = parseInt(previewImage.style.height) || previewImage.naturalHeight;
            
            // 计算新的大小
            const newScale = imageScale * factor;
            const newWidth = previewImage.naturalWidth * newScale;
            const newHeight = previewImage.naturalHeight * newScale;
            
            // 限制缩放范围
            if (newWidth < containerWidth * 0.5 || newHeight < containerHeight * 0.5) return;
            if (newWidth > containerWidth * 5 || newHeight > containerHeight * 5) return;
            
            imageScale = newScale;
            previewImage.style.width = newWidth + 'px';
            previewImage.style.height = newHeight + 'px';
        }

        function updateCropUI() {
            const cropMask = document.getElementById('cropMask');
            const cropGuide = document.getElementById('cropGuide');
            
            if (currentCropShape === 'circle') {
                cropMask.className = 'crop-mask';
                cropGuide.className = 'crop-guide circle';
            } else {
                cropMask.className = 'crop-mask square';
                cropGuide.className = 'crop-guide';
            }
        }

        function cropImage() {
            const previewImage = document.getElementById('previewImage');
            const cropContainer = document.getElementById('cropContainer');
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // 设置画布大小为裁剪区域大小
            const cropSize = cropContainer.offsetWidth * 0.4;
            canvas.width = cropSize;
            canvas.height = cropSize;
            
            // 计算裁剪区域在图片上的位置
            const cropLeft = (cropContainer.offsetWidth - cropSize) / 2;
            const cropTop = (cropContainer.offsetHeight - cropSize) / 2;
            
            // 获取图片的位置和大小
            const imageLeft = parseInt(previewImage.style.left) || 0;
            const imageTop = parseInt(previewImage.style.top) || 0;
            
            // 计算图片上的裁剪坐标
            const imgCropX = cropLeft - imageLeft;
            const imgCropY = cropTop - imageTop;
            
            // 确保坐标为正数
            const safeCropX = Math.max(0, imgCropX / imageScale);
            const safeCropY = Math.max(0, imgCropY / imageScale);
            
            if (currentCropShape === 'circle') {
                // 创建圆形裁剪
                ctx.beginPath();
                ctx.arc(cropSize / 2, cropSize / 2, cropSize / 2, 0, Math.PI * 2);
                ctx.clip();
            }
            
            ctx.drawImage(
                previewImage,
                safeCropX, safeCropY, cropSize / imageScale, cropSize / imageScale,
                0, 0, cropSize, cropSize
            );
            
            const croppedImageDataUrl = canvas.toDataURL('image/png');
            document.getElementById('nodeSymbol').value = croppedImageDataUrl;
            document.getElementById('imagePreview').style.display = 'none';
            
            // 清理
            currentImageFile = null;
            imageScale = 1;
            currentCropShape = 'square';
            // 重置形状选择按钮
            const shapeBtns = document.querySelectorAll('.shape-btn');
            shapeBtns.forEach(btn => btn.classList.remove('active'));
            shapeBtns[0].classList.add('active');
        }

        function setCropShape(shape) {
            currentCropShape = shape;
            const shapeBtns = document.querySelectorAll('.shape-btn');
            
            shapeBtns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            updateCropUI();
        }

        function cancelImageUpload() {
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imageUpload').value = '';
            currentImageFile = null;
            imageScale = 1;
            currentCropShape = 'square';
            // 重置形状选择按钮
            const shapeBtns = document.querySelectorAll('.shape-btn');
            shapeBtns.forEach(btn => btn.classList.remove('active'));
            shapeBtns[0].classList.add('active');
        }

        const categories = [
            { name: '人物' },
            { name: '事件' },
            { name: '物品' },
            { name: '地点' },
            { name: '时间' },
            { name: '项目' },
            { name: '概念' },
            { name: '组织' },
            { name: '其他' }
        ];

        const defaultColors = [
            '#6496ff', '#ff6496', '#96ff64', '#ff9664',
            '#64ff96', '#9664ff', '#ffff64', '#64ffff', '#ff64ff'
        ];

        let legendConfig = [
            { id: '0', name: '人物', color: '#6496ff' },
            { id: '1', name: '事件', color: '#ff6496' },
            { id: '2', name: '物品', color: '#96ff64' },
            { id: '3', name: '地点', color: '#ff9664' },
            { id: '4', name: '时间', color: '#64ff96' },
            { id: '5', name: '项目', color: '#9664ff' },
            { id: '6', name: '概念', color: '#ffff64' },
            { id: '7', name: '组织', color: '#64ffff' },
            { id: '8', name: '其他', color: '#ff64ff' }
        ];

        function openLegendModal() {
            const container = document.getElementById('legendCategoriesContainer');
            container.innerHTML = '';

            legendConfig.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'form-group';
                div.innerHTML = `
                    <label class="form-label">${index}. ${item.name}</label>
                    <div class="color-picker-wrapper">
                        <input type="color" class="color-picker" id="legendColor${index}" value="${item.color}">
                        <input type="text" class="form-input" id="legendColorText${index}" value="${item.color}">
                    </div>
                `;
                container.appendChild(div);
            });

            // 清空输入框
            document.getElementById('newTypeName').value = '';
            document.getElementById('newTypeColor').value = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');

            document.getElementById('legendModal').classList.add('active');
        }

        function addNewCategory() {
            const name = document.getElementById('newTypeName').value.trim();
            if (!name) {
                alert('请输入类型名称！');
                return;
            }

            const color = document.getElementById('newTypeColor').value;
            
            // 添加新类型到legendConfig
            const newCategory = {
                id: legendConfig.length.toString(),
                name: name,
                color: color
            };
            legendConfig.push(newCategory);

            // 更新图例编辑界面
            const container = document.getElementById('legendCategoriesContainer');
            const index = legendConfig.length - 1;
            const div = document.createElement('div');
            div.className = 'form-group';
            div.innerHTML = `
                <label class="form-label">${index}. ${name}</label>
                <div class="color-picker-wrapper">
                    <input type="color" class="color-picker" id="legendColor${index}" value="${color}">
                    <input type="text" class="form-input" id="legendColorText${index}" value="${color}">
                </div>
            `;
            container.appendChild(div);

            // 清空输入框
            document.getElementById('newTypeName').value = '';
            document.getElementById('newTypeColor').value = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');

            // 更新图表图例
            updateChartLegend();
        }

        function saveLegend() {
            legendConfig.forEach((item, index) => {
                const colorInput = document.getElementById(`legendColor${index}`);
                item.color = colorInput.value;
                // 更新 ID 为当前索引，确保动态性
                item.id = index.toString();
            });

            // 更新图表的图例
            updateChartLegend();
            closeModal('legendModal');
        }

        function updateChartLegend() {
            // 获取实际使用的类别索引
            const usedCategories = new Set();
            data.nodes.forEach(node => {
                if (node.category !== undefined && node.category !== null) {
                    usedCategories.add(node.category);
                }
            });
            
            // 根据实际使用的类别生成图例和categories
            const activeLegend = [];
            const activeCategories = [];
            
            usedCategories.forEach(categoryIndex => {
                if (legendConfig[categoryIndex]) {
                    const item = legendConfig[categoryIndex];
                    // 图例只显示描边颜色，填充为深色背景
                    activeLegend.push({
                        name: item.name,
                        icon: 'circle',
                        itemStyle: {
                            color: '#1a1a3a',
                            borderColor: item.color,
                            borderWidth: 3
                        }
                    });
                    activeCategories.push({
                        id: categoryIndex.toString(),
                        name: item.name,
                        itemStyle: {
                            color: '#1a1a3a',
                            borderColor: item.color,
                            borderWidth: 3
                        }
                    });
                }
            });
            
            chart.setOption({
                legend: [{
                    data: activeLegend,

        function initStarfield() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const stars = [];
            for (let i = 0; i < 300; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.5,
                    opacity: Math.random(),
                    speed: Math.random() * 0.5
                });
            }

            function animate() {
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const gradient = ctx.createRadialGradient(
                    canvas.width / 2, canvas.height / 2, 0,
                    canvas.width / 2, canvas.height / 2, canvas.width / 1.5
                );
                gradient.addColorStop(0, 'rgba(20, 30, 60, 0.5)');
                gradient.addColorStop(0.5, 'rgba(10, 15, 30, 0.3)');
                gradient.addColorStop(1, 'rgba(10, 10, 26, 0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                stars.forEach(star => {
                    star.opacity += (Math.random() - 0.5) * 0.02;
                    star.opacity = Math.max(0.1, Math.min(1, star.opacity));

                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(200, 220, 255, ${star.opacity})`;
                    ctx.fill();
                });

                requestAnimationFrame(animate);
            }
            animate();

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        function updateChart() {
            // 过滤节点和关系，处理收起/展开状态
            let filteredNodes = data.nodes;
            let filteredLinks = data.links;
            
            if (collapsedNodes.size > 0) {
                // 收集所有需要隐藏的节点ID（包括收起节点的子节点）
                let hiddenNodeIds = new Set();
                
                function collectHiddenNodes(nodeId) {
                    // 隐藏当前节点的所有子节点（以该节点为源的关系的目标节点）
                    data.links.forEach(link => {
                        if (link.source === nodeId) {
                            const targetId = link.target;
                            hiddenNodeIds.add(targetId);
                            // 递归收集子节点的子节点
                            collectHiddenNodes(targetId);
                        }
                    });
                }
                
                // 对每个收起的节点，收集其所有子节点
                collapsedNodes.forEach(nodeId => {
                    collectHiddenNodes(nodeId);
                });
                
                // 过滤节点：只显示未被隐藏的节点
                filteredNodes = data.nodes.filter(node => !hiddenNodeIds.has(node.id));
                
                // 过滤关系：只显示两端节点都未被隐藏的关系
                filteredLinks = data.links.filter(link => {
                    const sourceId = link.source;
                    const targetId = link.target;
                    return !hiddenNodeIds.has(sourceId) && !hiddenNodeIds.has(targetId);
                });
            }
            
            // 处理节点样式
            const styledNodes = filteredNodes.map(node => {
                const categoryColor = legendConfig[node.category]?.color || '#6496ff';
                return {
                    ...node,
                    itemStyle: {
                        color: node.itemStyle?.color || categoryColor,
                        borderColor: node.itemStyle?.borderColor || categoryColor,
                        borderWidth: node.itemStyle?.borderWidth || 3
                    }
                };
            });
            
            // 根据 hasLayoutCompleted 决定布局方式
            const layoutType = hasLayoutCompleted ? 'none' : 'force';
            
            chart.setOption({
                series: [{
                    data: styledNodes,
                    links: filteredLinks,
                    categories: legendConfig.map((item, index) => ({
                        id: index.toString(),
                        name: item.name,
                        itemStyle: {
                            color: '#1a1a3a',
                            borderColor: item.color,
                            borderWidth: 3
                        }
                    })),
                    layout: layoutType,
                    force: layoutType === 'none' ? {} : { repulsion: 2000, gravity: 0.01, edgeLength: 200, layoutAnimation: true, friction: 0.2, edgeLengthMin: 150, edgeLengthMax: 400, initLayout: 'circular' }
                }]
            });
        }

        function saveNode() {
            const name = document.getElementById('nodeName').value.trim();
            if (!name) {
                alert('请输入节点名称！');
                return;
            }

            const category = parseInt(document.getElementById('nodeCategory').value);
            let size = parseInt(document.getElementById('nodeSizeValue').value);
            // 确保大小在有效范围内
            size = Math.max(10, Math.min(200, size));
            // 获取描边和填充颜色
            const borderColor = document.getElementById('nodeBorderColor').value;
            const fillColor = document.getElementById('nodeFillColor').value;
            const borderWidth = parseInt(document.getElementById('nodeBorderWidthValue').value) || 3;
            const symbol = document.getElementById('nodeSymbol').value.trim();

            if (editingNodeId) {
                const node = data.nodes.find(n => n.id === editingNodeId);
                if (node) {
                    node.name = name;
                    node.category = category;
                    node.symbolSize = size;
                    node.itemStyle = { 
                        color: fillColor, 
                        borderColor: borderColor, 
                        borderWidth: borderWidth 
                    };
                    if (symbol) {
                        node.symbol = 'image://' + symbol;
                    } else {
                        delete node.symbol;
                    }
                }
            } else {
                // 计算已有节点的平均坐标，新节点放置在该平均坐标附近
                let avgX = 0;
                let avgY = 0;
                let validNodeCount = 0;
                
                data.nodes.forEach(node => {
                    if (node.x !== undefined && node.y !== undefined && !isNaN(node.x) && !isNaN(node.y) && isFinite(node.x) && isFinite(node.y)) {
                        avgX += node.x;
                        avgY += node.y;
                        validNodeCount++;
                    }
                });
                
                // 如果没有有效节点，使用容器中心附近的默认坐标
                if (validNodeCount === 0) {
                    const chartDom = chart.getDom();
                    avgX = chartDom.offsetWidth / 2;
                    avgY = chartDom.offsetHeight / 2;
                } else {
                    avgX = avgX / validNodeCount;
                    avgY = avgY / validNodeCount;
                }
                
                // 加上随机偏移 ±50
                const randomX = (Math.random() - 0.5) * 100;
                const randomY = (Math.random() - 0.5) * 100;
                
                const newNode = {
                    id: Date.now().toString(),
                    name: name,
                    category: category,
                    symbolSize: size,
                    x: avgX + randomX,
                    y: avgY + randomY,
                    fixed: true,
                    itemStyle: { 
                        color: fillColor, 
                        borderColor: borderColor, 
                        borderWidth: borderWidth 
                    }
                };
                if (symbol) {
                    newNode.symbol = 'image://' + symbol;
                }
                data.nodes.push(newNode);
            }

            saveToHistory(); // 保存到历史
            closeModal('nodeModal');
            updateChart();
            updateInfo();
        }

        function saveEdge() {

            const lineColor = document.getElementById('edgeColor').value;
            const labelColor = document.getElementById('edgeLabelColor').value;

            saveToHistory(); // 保存到历史
            if (editingEdgeIndex !== null) {
                data.links[editingEdgeIndex].name = name;
                data.links[editingEdgeIndex].lineStyle = { color: lineColor };
                data.links[editingEdgeIndex].label = { color: labelColor };

                    source: window.currentEdgeSource.id,
                    target: window.currentEdgeTarget.id,
                    name: name,
                    lineStyle: { color: lineColor },
                    label: { color: labelColor }

            closeModal('edgeModal');
            updateChart();

                selectedEdge = null;
                document.getElementById('selectedInfo').style.display = 'none';

        function centerView() {
            // 保存当前所有节点位置到 data.nodes 中
            const currentOption = chart.getOption();
            if (currentOption.series && currentOption.series[0]) {
                const seriesData = currentOption.series[0].data;
                seriesData.forEach(node => {
                    const dataNode = data.nodes.find(n => n.id === node.id);
                    if (dataNode) {
                        dataNode.x = node.x;
                        dataNode.y = node.y;
                        dataNode.fixed = true;
                    }
                });
            }
            
            // 计算节点边界
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            data.nodes.forEach(node => {
                if (node.x !== undefined && node.y !== undefined && !isNaN(node.x) && !isNaN(node.y) && isFinite(node.x) && isFinite(node.y)) {
                    const size = node.symbolSize || 40;
                    minX = Math.min(minX, node.x - size);
                    minY = Math.min(minY, node.y - size);
                    maxX = Math.max(maxX, node.x + size);
                    maxY = Math.max(maxY, node.y + size);
                }
            });
            
            if (minX !== Infinity) {
                const chartDom = chart.getDom();
                const viewWidth = chartDom.offsetWidth;
                const viewHeight = chartDom.offsetHeight;
                
                const nodesWidth = maxX - minX;
                const nodesHeight = maxY - minY;
                
                const padding = 0.3;
                let zoom = 1;
                
                if (nodesWidth > 0 && nodesHeight > 0) {
                    const scaleX = viewWidth / (nodesWidth * (1 + padding));
                    const scaleY = viewHeight / (nodesHeight * (1 + padding));
                    zoom = Math.min(1, Math.min(scaleX, scaleY));
                }
                
                const centerX = (minX + maxX) / 2;
                const centerY = (minY + maxY) / 2;
                
                // 一次 setOption 完成所有操作：设置 roam、layout、zoom、center，清除旧的 force 配置，关闭动画
                chart.setOption({
                    animation: false,
                    series: [{
                        roam: true,
                        layout: 'none',
                        zoom: zoom,
                        center: [centerX, centerY],
                        force: {}
                    }]
                });
            }
        }

        function resetLayout() {
            centerView();
        }

        function exportData() {
            const exportData = {
                ...data,
                legendConfig: legendConfig
            };
            const json = JSON.stringify(exportData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'knowledge-graph.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (importedData.nodes && importedData.links) {
                        data.nodes = importedData.nodes;
                        data.links = importedData.links;
                        if (importedData.legendConfig) {
                            legendConfig = importedData.legendConfig;
                            updateChartLegend();
                        }
                        history = [];
                        historyIndex = -1;
                        saveToHistory();
                        hasLayoutCompleted = false;
                        updateChart();
                        updateInfo();
                        alert('导入成功！');
                    } else {
                        alert('无效的数据格式！');
                    }
                } catch (err) {
                    alert('导入失败：' + err.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // 执行导出
        function doExport() {
            try {
                // 首先确保我们保存了当前所有节点的位置
                const currentOption = chart.getOption();
                if (currentOption.series && currentOption.series[0]) {
                    const seriesData = currentOption.series[0].data;
                    seriesData.forEach(node => {
                        const dataNode = data.nodes.find(n => n.id === node.id);
                        if (dataNode && node.x !== undefined) {
                            dataNode.x = node.x;
                            dataNode.y = node.y;
                            dataNode.fixed = true;
                        }
                    });
                }
                
                // 检查是否有可导出的节点
                if (data.nodes.length === 0) {
                    alert('没有节点可以导出！');
                    return;
                }
                
                // 获取图表尺寸
                const chartDom = chart.getDom();
                const baseWidth = chartDom.offsetWidth;
                const baseHeight = chartDom.offsetHeight;
                
                // 使用 convertToPixel 检查每个节点是否在可视范围内
                let allNodesVisible = true;
                const visibleNodes = [];
                
                data.nodes.forEach(node => {
                    if (node.x !== undefined && node.y !== undefined) {
                        const pixelPos = chart.convertToPixel({ seriesIndex: 0 }, [node.x, node.y]);
                        const size = node.symbolSize || 40;
                        
                        if (pixelPos) {
                            // 检查节点是否在可视范围内（像素坐标已反映当前缩放，直接用 size / 2）
                            const halfSize = size / 2;
                            const isVisible = (
                                pixelPos[0] + halfSize >= 0 &&
                                pixelPos[0] - halfSize <= baseWidth &&
                                pixelPos[1] + halfSize >= 0 &&
                                pixelPos[1] - halfSize <= baseHeight
                            );
                            
                            if (!isVisible) {
                                allNodesVisible = false;
                            }
                            
                            visibleNodes.push({
                                node: node,
                                pixelPos: pixelPos,
                                isVisible: isVisible
                            });
                        } else {
                            // 无法获取像素位置，视为不可见
                            allNodesVisible = false;
                            visibleNodes.push({
                                node: node,
                                pixelPos: null,
                                isVisible: false
                            });
                        }
                    }
                });
                
                // 模式1：所有节点都在可视范围内，直接导出当前视图
                if (allNodesVisible) {
                    try {
                        let success = false;
                        
                        if (exportFormat === 'png') {
                            const url = chart.getDataURL({
                                type: 'png',
                                pixelRatio: 2,
                                backgroundColor: '#0a0a1a'
                            });
                            downloadFile(url, `knowledge-graph-${Date.now()}.png`);
                            success = true;
                        } else if (exportFormat === 'svg') {
                            const url = chart.getDataURL({
                                type: 'svg',
                                backgroundColor: '#0a0a1a'
                            });
                            downloadFile(url, `knowledge-graph-${Date.now()}.svg`);
                            success = true;
                        } else if (exportFormat === 'pdf') {
                            const pngUrl = chart.getDataURL({
                                type: 'png',
                                pixelRatio: 2,
                                backgroundColor: '#0a0a1a'
                            });
                            
                            const { jsPDF } = window.jspdf;
                            const pdfWidth = baseWidth * 0.264583;
                            const pdfHeight = baseHeight * 0.264583;
                            
                            const pdf = new jsPDF({
                                orientation: pdfWidth > pdfHeight ? 'landscape' : 'portrait',
                                unit: 'mm',
                                format: [pdfWidth, pdfHeight]
                            });
                            
                            pdf.addImage(pngUrl, 'PNG', 0, 0, pdfWidth, pdfHeight);
                            pdf.save(`knowledge-graph-${Date.now()}.pdf`);
                            success = true;
                        }
                        
                        if (success) {
                            closeModal('exportModal');
                            alert('导出成功！');
                            return;
                        }
                    } catch (e) {
                        console.error('直接导出失败，尝试备用方案', e);
                    }
                }
                
                // 模式2：有节点不可见，计算节点簇边界，创建足够大的画布导出完整内容
                // 计算节点簇边界
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                data.nodes.forEach(node => {
                    const x = node.x;
                    const y = node.y;
                    if (x !== undefined && y !== undefined && !isNaN(x) && !isNaN(y) && isFinite(x) && isFinite(y)) {
                        const size = node.symbolSize || 40;
                        minX = Math.min(minX, x - size);
                        minY = Math.min(minY, y - size);
                        maxX = Math.max(maxX, x + size);
                        maxY = Math.max(maxY, y + size);
                    }
                });
                
                // 如果所有节点都没有位置，使用默认范围
                if (minX === Infinity) {
                    minX = 0;
                    minY = 0;
                    maxX = baseWidth;
                    maxY = baseHeight;
                }
                
                const legendHeight = 60;
                const padding = 40;
                
                const nodesWidth = maxX - minX;
                const nodesHeight = maxY - minY;
                
                let exportWidth = Math.max(nodesWidth + padding * 2, baseWidth);
                let exportHeight = Math.max(nodesHeight + padding * 2 + legendHeight, baseHeight);
                
                const tempContainer = document.createElement('div');
                tempContainer.style.position = 'fixed';
                tempContainer.style.top = '-9999px';
                tempContainer.style.left = '-9999px';
                tempContainer.style.width = exportWidth + 'px';
                tempContainer.style.height = exportHeight + 'px';
                tempContainer.style.background = '#0a0a1a';
                document.body.appendChild(tempContainer);
                
                const tempChart = echarts.init(tempContainer);
                
                // 准备节点数据，调整位置到新坐标系
                const offsetX = padding - minX;
                const offsetY = padding - minY;
                
                const styledNodes = data.nodes.map(node => {
                    const categoryColor = legendConfig[node.category]?.color || '#6496ff';
                    const newNode = {
                        ...node,
                        itemStyle: {
                            color: node.itemStyle?.color || categoryColor,
                            borderColor: node.itemStyle?.borderColor || categoryColor,
                            borderWidth: node.itemStyle?.borderWidth || 3
                        },
                        fixed: true
                    };
                    
                    if (newNode.x !== undefined && newNode.y !== undefined) {
                        newNode.x = newNode.x + offsetX;
                        newNode.y = newNode.y + offsetY;
                    }
                    
                    return newNode;
                });
                
                // 配置临时图表，设置 layout: 'none' 避免重新布局，使用硬编码配置避免函数引用错误
                const tempOption = {
                    animation: false,
                    backgroundColor: '#0a0a1a',
                    tooltip: {
                        show: true,
                        formatter: '{b}'
                    },
                    legend: [{
                        show: true,
                        data: legendConfig.map(item => item.name),
                        top: exportHeight - legendHeight,
                        left: 'center',
                        textStyle: {
                            color: '#e0e6ff'
                        }
                    }],
                    series: [{
                        type: 'graph',
                        layout: 'none',
                        data: styledNodes,
                        links: data.links,
                        categories: legendConfig.map((item, index) => ({
                            id: index.toString(),
                            name: item.name,
                            itemStyle: {
                                color: '#1a1a3a',
                                borderColor: item.color,
                                borderWidth: 3
                            }
                        })),
                        roam: false,
                        label: {
                            show: true,
                            position: 'right',
                            formatter: '{b}',
                            color: '#e0e6ff',
                            fontSize: 12
                        },
                        edgeLabel: {
                            show: true,
                            formatter: function(p) {
                                return p.data.source + '>' + p.data.target;
                            },
                            color: '#e0e6ff',
                            fontSize: 11
                        },
                        lineStyle: {
                            color: '#6496ff',
                            width: 2
                        },
                        emphasis: {
                            focus: 'adjacency',
                            lineStyle: {
                                width: 5
                            }
                        },
                        draggable: false,
                        nodeStyle: {},
                        select: {}
                    }]
                };
                
                tempChart.resize({ width: exportWidth, height: exportHeight });
                tempChart.setOption(tempOption, true);
                
                setTimeout(() => {
                    try {
                        let success = false;
                        
                        if (exportFormat === 'png') {
                            const url = tempChart.getDataURL({
                                type: 'png',
                                pixelRatio: 2,
                                backgroundColor: '#0a0a1a'
                            });
                            downloadFile(url, `knowledge-graph-${Date.now()}.png`);
                            success = true;
                        } else if (exportFormat === 'svg') {
                            const url = tempChart.getDataURL({
                                type: 'svg',
                                backgroundColor: '#0a0a1a'
                            });
                            downloadFile(url, `knowledge-graph-${Date.now()}.svg`);
                            success = true;
                        } else if (exportFormat === 'pdf') {
                            const pngUrl = tempChart.getDataURL({
                                type: 'png',
                                pixelRatio: 2,
                                backgroundColor: '#0a0a1a'
                            });
                            
                            const { jsPDF } = window.jspdf;
                            const pdfWidth = exportWidth * 0.264583;
                            const pdfHeight = exportHeight * 0.264583;
                            
                            const pdf = new jsPDF({
                                orientation: pdfWidth > pdfHeight ? 'landscape' : 'portrait',
                                unit: 'mm',
                                format: [pdfWidth, pdfHeight]
                            });
                            
                            pdf.addImage(pngUrl, 'PNG', 0, 0, pdfWidth, pdfHeight);
                            pdf.save(`knowledge-graph-${Date.now()}.pdf`);
                            success = true;
                        }
                        
                        tempChart.dispose();
                        document.body.removeChild(tempContainer);
                        closeModal('exportModal');
                        
                        if (success) {
                            alert('导出成功！');
                        }
                    } catch (err) {
                        tempChart.dispose();
                        document.body.removeChild(tempContainer);
                        alert('导出失败: ' + err.message);
                    }
                }, 800);
                
            } catch (err) {
                alert('导出失败: ' + err.message);
            }
        }

        function searchNode() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            if (!searchTerm) {
                alert('请输入节点名称！');
                return;
            }
            
            const foundNode = data.nodes.find(node => 
                node.name.toLowerCase().includes(searchTerm.toLowerCase())
            );
            
            if (foundNode) {
                // 找到节点，获取其索引
                const nodeIndex = data.nodes.indexOf(foundNode);
                
                // 高亮并居中显示该节点
                chart.dispatchAction({
                    type: 'focusNodeAdjacency',
                    seriesIndex: 0,
                    dataIndex: nodeIndex
                });
                
                chart.dispatchAction({
                    type: 'showTip',
                    seriesIndex: 0,
                    dataIndex: nodeIndex
                });
                
                // 更新选中信息
                selectedNode = foundNode;
                selectedEdge = null;
                updateSelectedInfo(foundNode.name, foundNode.id);
                
                alert(`已定位到节点: ${foundNode.name}`);
            } else {
                alert('未找到匹配的节点！');

                saveToHistory(); // 保存到历史
                // 删除节点
                data.nodes = data.nodes.filter(n => n.id !== nodeId);
                // 删除相关的关系
                data.links = data.links.filter(l => l.source !== nodeId && l.target !== nodeId);
                // 更新图表
                updateChart();
                updateInfo();
                // 刷新属性表
                openAttributeTable();
            }
        }

        let collapsedNodes = new Set(); // 存储已收起的节点ID

        function expandCollapseNode() {
            if (!selectedNode) {
                alert('请先点击选择一个节点！');
                return;
            }
            
            const nodeId = selectedNode.id;
            
            // 切换节点的收起/展开状态
            if (collapsedNodes.has(nodeId)) {
                collapsedNodes.delete(nodeId);
                alert(`已展开节点 "${selectedNode.name}" 的子层级`);
            } else {
                collapsedNodes.add(nodeId);
                alert(`已收起节点 "${selectedNode.name}" 的子层级`);

        });
        document.getElementById('nodeFillColorR').addEventListener('input', updateFillColorFromRGB);
        document.getElementById('nodeFillColorG').addEventListener('input', updateFillColorFromRGB);
        document.getElementById('nodeFillColorB').addEventListener('input', updateFillColorFromRGB);

        // 描边宽度事件监听
        const borderWidthSlider = document.getElementById('nodeBorderWidth');
        const borderWidthInput = document.getElementById('nodeBorderWidthValue');
        borderWidthSlider.addEventListener('input', function() {
            borderWidthInput.value = this.value;
        });
        borderWidthInput.addEventListener('input', function() {
            let value = parseInt(this.value);
            if (isNaN(value)) value = 3;
            if (value < 0) value = 0;
            if (value > 20) value = 20;
            this.value = value;
            borderWidthSlider.value = value;
        });

        // 原有的颜色事件监听
        document.getElementById('edgeColor').addEventListener('input', function() {
            document.getElementById('edgeColorText').value = this.value;
        });
        document.getElementById('edgeColorText').addEventListener('input', function() {
            document.getElementById('edgeColor').value = this.value;
        });
        document.getElementById('edgeLabelColor').addEventListener('input', function() {
            document.getElementById('edgeLabelColorText').value = this.value;
        });
        document.getElementById('edgeLabelColorText').addEventListener('input', function() {
            document.getElementById('edgeLabelColor').value = this.value;
        });

        // 从RGB更新描边颜色
        function updateBorderColorFromRGB() {
            const r = parseInt(document.getElementById('nodeBorderColorR').value) || 0;
            const g = parseInt(document.getElementById('nodeBorderColorG').value) || 0;
            const b = parseInt(document.getElementById('nodeBorderColorB').value) || 0;
            const hex = rgbToHex(r, g, b);
            document.getElementById('nodeBorderColor').value = hex;
            document.getElementById('nodeBorderColorText').value = hex;
        }

        // 从RGB更新填充颜色
        function updateFillColorFromRGB() {
            const r = parseInt(document.getElementById('nodeFillColorR').value) || 0;
            const g = parseInt(document.getElementById('nodeFillColorG').value) || 0;
            const b = parseInt(document.getElementById('nodeFillColorB').value) || 0;
            const hex = rgbToHex(r, g, b);
            document.getElementById('nodeFillColor').value = hex;
            document.getElementById('nodeFillColorText').value = hex;
        }

        // 节点大小滑动条和数字输入框的双向关联
        const nodeSizeSlider = document.getElementById('nodeSize');
        const nodeSizeInput = document.getElementById('nodeSizeValue');
        
        nodeSizeSlider.addEventListener('input', function() {
            nodeSizeInput.value = this.value;
        });
        
        nodeSizeInput.addEventListener('input', function() {
            let value = parseInt(this.value);
            if (isNaN(value)) value = 40;
            if (value < 0) value = 0;
            if (value > 100) value = 100;
            this.value = value;
            nodeSizeSlider.value = value;
        });

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal(this.id);
                }
            });
        });

        initStarfield();
        initChart();
    </script>
</body>
</html>
